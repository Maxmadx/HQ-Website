<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=11" />
    <link rel="alternate icon" href="/favicon.ico?v=11" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title fallback (replaced per-route by react-helmet-async via the Seo component) -->
    <title>HQ Aviation</title>
    <!-- All SEO meta tags (description, og:, twitter:) are injected per-route by the
         Seo component (src/components/seo/Seo.jsx) using react-helmet-async. Do NOT add
         static description/og:/twitter: tags here — they would duplicate the per-route
         tags and Google would index the static version (which appears first in DOM). -->
    <link rel="canonical" href="https://hqaviation.com/" />

    <!-- Fonts - Space Grotesk + Share Tech Mono (brand fonts from inspiration-2.html) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- Inter, Montserrat, Playfair Display (additional fonts for HQ Redesign system) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
