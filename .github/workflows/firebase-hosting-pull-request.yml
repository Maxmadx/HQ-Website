name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm test
      - run: npm run build
      # Preview deploy is best-effort: only runs when the Firebase service
      # account secret is configured. Without it, build + test remain the real
      # CI gate and the workflow still passes. To re-enable PR previews, add a
      # FIREBASE_SERVICE_ACCOUNT_HQ_WEBSITE_4ABC7 repo secret (Firebase console
      # > Project settings > Service accounts > Generate new private key).
      - uses: FirebaseExtended/action-hosting-deploy@v0
        if: ${{ env.FIREBASE_SA != '' }}
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HQ_WEBSITE_4ABC7 }}
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HQ_WEBSITE_4ABC7 }}
          projectId: hq-website-4abc7
